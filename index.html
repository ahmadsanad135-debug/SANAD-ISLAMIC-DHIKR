<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أذكار المسلم</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f3d0f; --accent: #d4af37; --bg: #f5f5f5; --card: #ffffff; --text: #333; --shadow: 0 4px 15px rgba(0,0,0,0.08); }
        [data-theme="dark"] { --primary: #1a4d1a; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --shadow: 0 4px 20px rgba(0,0,0,0.4); }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 20px; }

        header {
            background: linear-gradient(135deg, var(--primary), #0a290a);
            color: white; padding: 15px 20px; border-radius: 0 0 25px 25px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
        }

        .theme-btn { background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

        .container { padding: 20px; max-width: 800px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }

        .card {
            background: var(--card); padding: 20px; border-radius: 18px; text-align: center;
            box-shadow: var(--shadow); cursor: pointer; transition: 0.2s; border: 2px solid transparent;
        }
        .card:active { transform: scale(0.95); }
        .card:hover { border-color: var(--accent); }
        .card svg { width: 40px; height: 40px; fill: var(--primary); margin-bottom: 10px; }
        [data-theme="dark"] .card svg { fill: var(--accent); }

        #dhikr-page { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 200; overflow-y: auto; padding: 20px; }
        .page-header { display: flex; align-items: center; margin-bottom: 15px; gap: 15px; }
        .back-btn { background: var(--card); border: none; padding: 10px; border-radius: 12px; color: var(--primary); width: 45px; height: 45px; cursor: pointer; font-size: 1.2rem; }

        .progress-bar { height: 6px; background: rgba(0,0,0,0.1); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }

        .dhikr-card {
            background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px;
            box-shadow: var(--shadow); border-right: 5px solid var(--primary); position: relative;
        }
        .dhikr-card.completed { opacity: 0.6; border-color: #4CAF50; }
        .dhikr-text { font-family: 'Amiri', serif; font-size: 1.3rem; line-height: 1.7; margin-bottom: 15px; }
        .count-badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 15px; font-size: 0.9rem; font-weight: bold; }
        
        .tap-area { position: absolute; inset: 0; z-index: 1; cursor: pointer; }
        .click-effect { position: absolute; background: rgba(212, 175, 55, 0.2); border-radius: 50%; transform: scale(0); animation: ripple 0.4s linear; pointer-events: none; }
        @keyframes ripple { to { transform: scale(4); opacity: 0; } }

        #install-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; display: none; z-index: 300; }
    </style>
</head>
<body>

    <header>
        <h1>أذكار المسلم</h1>
        <button class="theme-btn" onclick="toggleTheme()">🌓</button>
    </header>

    <div class="container" id="home-page">
        <div class="grid" id="categories-grid"></div>
    </div>

    <div id="dhikr-page">
        <div class="page-header">
            <button class="back-btn" onclick="showHome()">➜</button>
            <h2 id="page-title"></h2>
            <span id="progress-text" style="margin-right:auto; font-weight:bold;">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div id="dhikr-list"></div>
    </div>

    <button id="install-btn" onclick="installApp()">تثبيت التطبيق ⬇</button>

    <script src="dhikr-data.js"></script>
    <script>
        const $ = id => document.getElementById(id);
        let deferredPrompt;

        // إعادة ضبط الأذكار يومياً
        const checkReset = () => {
            const today = new Date().toLocaleDateString();
            if (localStorage.getItem('last_reset') !== today) {
                Object.keys(localStorage).forEach(k => k.startsWith('d-') && localStorage.removeItem(k));
                localStorage.setItem('last_reset', today);
            }
        };

        const getIcon = (n) => {
            if (n.includes('الصباح')) return `<path d="M12 7V3M5 12H1m18 0h4m-5.3-6.7l2.8-2.8M6.3 17.7l-2.8 2.8M17.7 17.7l2.8 2.8M6.3 6.3l-2.8-2.8M12 18a6 6 0 100-12 6 6 0 000 12z"/>`;
            if (n.includes('المساء')) return `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>`;
            return `<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>`;
        };

        function init() {
            checkReset();
            $('categories-grid').innerHTML = Object.keys(dhikrData).map(cat => `
                <div class="card" onclick="openCat('${cat}')">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">${getIcon(cat)}</svg>
                    <h3>${cat}</h3>
                    <small>${dhikrData[cat].length} ذكر</small>
                </div>
            `).join('');
            if(localStorage.getItem('dark') === '1') document.body.setAttribute('data-theme', 'dark');
        }

        function toggleTheme() {
            const isDark = document.body.hasAttribute('data-theme');
            isDark ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
            localStorage.setItem('dark', isDark ? '0' : '1');
        }

        function openCat(cat) {
            $('home-page').style.display = 'none';
            $('dhikr-page').style.display = 'block';
            $('page-title').innerText = cat;
            renderList(cat);
            updateProgress(cat);
        }

        function renderList(cat) {
            $('dhikr-list').innerHTML = dhikrData[cat].map((item, i) => {
                const count = localStorage.getItem(`d-${cat}-${i}`) || 0;
                return `
                <div class="dhikr-card ${count >= item.count ? 'completed' : ''}" id="c-${i}">
                    <div class="tap-area" onclick="tap('${cat}', ${i}, ${item.count}, event)"></div>
                    <div class="dhikr-text">${item.text}</div>
                    <span class="count-badge" id="b-${i}">${count} / ${item.count}</span>
                </div>`;
            }).join('');
        }

        function tap(cat, i, max, e) {
            let n = parseInt(localStorage.getItem(`d-${cat}-${i}`)) || 0;
            if (n < max) {
                n++;
                localStorage.setItem(`d-${cat}-${i}`, n);
                $(`b-${i}`).innerText = `${n} / ${max}`;
                if (n >= max) $(`c-${i}`).classList.add('completed');
                
                const ripple = document.createElement('div');
                ripple.className = 'click-effect';
                ripple.style.left = e.offsetX + 'px'; ripple.style.top = e.offsetY + 'px';
                e.target.appendChild(ripple);
                setTimeout(() => ripple.remove(), 400);
                
                navigator.vibrate?.(n >= max ? [50, 30, 50] : 30);
                updateProgress(cat);
            }
        }

        function updateProgress(cat) {
            const total = dhikrData[cat].length;
            const done = dhikrData[cat].filter((_, i) => (localStorage.getItem(`d-${cat}-${i}`) || 0) >= dhikrData[cat][i].count).length;
            const p = Math.round((done / total) * 100);
            $('progress-fill').style.width = p + '%';
            $('progress-text').innerText = p + '%';
        }

        function showHome() { $('home-page').style.display = 'block'; $('dhikr-page').style.display = 'none'; }

        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; $('install-btn').style.display = 'block'; });
        async function installApp() { if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; $('install-btn').style.display = 'none'; } }

        init();
    </script>
</body>
</html>
