<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f3d0f">
    <meta name="description" content="تطبيق أذكار المسلم - حصن المسلم الشامل">
    <title>أذكار المسلم</title>
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f3d0f;
            --accent: #d4af37;
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #333333;
            --text-sec: #666666;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --primary: #1a4d1a;
            --accent: #f0c445;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --text-sec: #aaaaaa;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 80px; }

        header {
            background: linear-gradient(135deg, var(--primary), #0a290a);
            color: white;
            padding: 20px;
            border-radius: 0 0 30px 30px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 { font-size: 1.5rem; font-weight: 700; }
        
        .header-buttons { display: flex; gap: 10px; }

        .theme-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            font-size: 1.2rem;
        }
        
        .theme-btn:active { transform: scale(0.9); }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .card:active { transform: scale(0.96); }
        .card:hover { border-color: var(--accent); }

        .card-icon { width: 50px; height: 50px; fill: var(--primary); margin-bottom: 5px; }
        [data-theme="dark"] .card-icon { fill: var(--accent); }

        .card h3 { font-size: 1rem; color: var(--text); }
        .card span { font-size: 0.8rem; color: var(--text-sec); }

        #dhikr-page {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            z-index: 200;
            overflow-y: auto;
            padding: 20px;
        }

        .page-header { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }

        .back-btn {
            background: var(--card);
            border: none;
            padding: 10px;
            border-radius: 12px;
            color: var(--primary);
            box-shadow: var(--shadow);
            cursor: pointer;
            font-size: 1.2rem;
            width: 45px; height: 45px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            margin: 10px 0 20px;
            overflow: hidden;
            width: 100%;
        }

        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

        .dhikr-card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            border-right: 4px solid var(--primary);
            transition: 0.3s;
        }

        .dhikr-card.completed { opacity: 0.6; border-color: #4CAF50; background: rgba(76, 175, 80, 0.05); }

        .dhikr-text { font-family: 'Amiri', serif; font-size: 1.4rem; line-height: 1.8; margin-bottom: 20px; }

        .dhikr-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }

        .count-badge {
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .tap-area { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; cursor: pointer; }
        
        #install-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; padding: 12px 25px; border-radius: 30px;
            border: none; font-weight: bold; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            z-index: 300; display: none; animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }
        
        .click-effect {
            position: absolute; background: rgba(212, 175, 55, 0.3); border-radius: 50%;
            transform: scale(0); animation: ripple 0.6s linear; pointer-events: none;
        }

        @keyframes ripple { to { transform: scale(4); opacity: 0; } }

        #reminders-setup {
            display: none; background: var(--card); padding: 20px; border-radius: 20px;
            box-shadow: var(--shadow); border: 1px solid var(--accent); margin-bottom: 20px;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.03);
            padding: 12px 15px;
            border-radius: 12px;
            margin-top: 5px;
        }
        [data-theme="dark"] .toggle-container { background: rgba(255, 255, 255, 0.05); }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        [data-theme="dark"] input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

    <header>
        <h1>أذكار المسلم</h1>
        <div class="header-buttons">
            <button class="theme-btn" onclick="toggleSettings()" aria-label="الإعدادات">🔔</button>
            <button class="theme-btn" onclick="toggleTheme()" aria-label="تغيير المظهر">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
            </button>
        </div>
    </header>

    <div class="container" id="home-page">
        <div id="reminders-setup">
            <h3 style="font-size: 1rem; margin-bottom: 5px; color: var(--primary);">⏰ إشعارات الأذكار الفورية</h3>
            <p style="font-size: 0.8rem; color: var(--text-sec); margin-bottom: 15px;">تحكم في استقبال أذكار التنبيه الفورية على جهازك في أي وقت.</p>
            
            <div class="toggle-container">
                <span style="font-size: 0.9rem; font-weight: bold;">تفعيل استقبال الإشعارات</span>
                <label class="switch">
                    <input type="checkbox" id="firebase-toggle" onchange="handleNotificationToggle(this)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="grid" id="categories-grid"></div>
        <p id="loading-msg" style="text-align:center; margin-top:20px;">جاري تحميل الأذكار...</p>
    </div>

    <div id="dhikr-page">
        <div class="page-header">
            <button class="back-btn" onclick="showHome()">➜</button>
            <h2 id="page-title">العنوان</h2>
            <span id="progress-text" style="margin-right:auto; font-weight:bold; color:var(--primary)">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div id="dhikr-list"></div>
    </div>

    <button id="install-btn" onclick="installApp()">تثبيت التطبيق ⬇</button>

    <script src="./dhikr-data.js"></script>

    <script>
        const grid = document.getElementById('categories-grid');
        const dhikrPage = document.getElementById('dhikr-page');
        const homePage = document.getElementById('home-page');
        const dhikrList = document.getElementById('dhikr-list');
        const pageTitle = document.getElementById('page-title');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const installBtn = document.getElementById('install-btn');
        let deferredPrompt;

        function checkDailyReset() {
            const now = new Date();
            const todayKey = new Date(now.getTime() - (4 * 60 * 60 * 1000)).toLocaleDateString();
            const lastResetDate = localStorage.getItem('last_reset_date');
            if (lastResetDate !== todayKey) {
                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith('dhikr-')) localStorage.removeItem(key);
                });
                localStorage.setItem('last_reset_date', todayKey);
            }
        }
        checkDailyReset();

        function getCategoryIcon(name) {
            const icons = {
                morning: `<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>`,
                evening: `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>`,
                prayer: `<path d="M3 10l9-7 9 7"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/>`,
                mosque: `<path d="M12 2l4 4v4h2v10H6V10h2V6z"/>`,
                wudu: `<path d="M12 2C9 6 7 8 7 12a5 5 0 0010 0c0-4-2-6-5-10z"/>`,
                sleep: `<path d="M20 12.5A7.5 7.5 0 1111.5 4 6 6 0 0020 12.5z"/>`,
                wakeup: `<circle cx="12" cy="13" r="7"/><path d="M12 9v4l2 2"/><path d="M5 3L2 6"/><path d="M19 3l3 3"/>`,
                food: `<path d="M6 2v10"/><path d="M10 2v10"/><path d="M6 6h4"/><path d="M16 2v18"/>`,
                drink: `<path d="M7 2h10l-1 7a4 4 0 01-8 0z"/><path d="M9 22h6"/>`,
                home: `<path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/>`,
                travel: `<path d="M2 16l20-5"/><path d="M6 12l4 4"/>`,
                quran: `<path d="M4 19a2 2 0 012-2h14"/><path d="M6 17V5a2 2 0 012-2h12v16"/>`,
                tasbeeh: `<circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>`,
                forgiveness: `<path d="M12 2v4"/><path d="M12 22v-4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><circle cx="12" cy="12" r="5"/>`,
                adhkar: `<path d="M12 3l2.5 5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-1z"/>`
            };

            if (name.includes('الصباح')) return icons.morning;
            if (name.includes('المساء')) return icons.evening;
            if (name.includes('الصلاة')) return icons.prayer;
            if (name.includes('المسجد')) return icons.mosque;
            if (name.includes('وضوء')) return icons.wudu;
            if (name.includes('النوم')) return icons.sleep;
            if (name.includes('الاستيقاظ')) return icons.wakeup;
            if (name.includes('الطعام')) return icons.food;
            if (name.includes('الشراب')) return icons.drink;
            if (name.includes('المنزل')) return icons.home;
            if (name.includes('السفر')) return icons.travel;
            if (name.includes('القرآن')) return icons.quran;
            if (name.includes('تسابيح') || name.includes('التسبيح')) return icons.tasbeeh;
            if (name.includes('الاستغفار')) return icons.forgiveness;

            return icons.adhkar;
        }

        function init() {
            if (typeof dhikrData === 'undefined') {
                document.getElementById('loading-msg').innerHTML = '❌ خطأ في تحميل dhikr-data.js';
                return;
            }
            document.getElementById('loading-msg').style.display = 'none';
            grid.innerHTML = '';
            
            Object.keys(dhikrData).forEach(category => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        ${getCategoryIcon(category)}
                    </svg>
                    <h3>${category}</h3>
                    <span>${dhikrData[category].length} ذكر</span>
                `;
                card.onclick = () => openCategory(category);
                grid.appendChild(card);
            });
            if(localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');

            // 🚀 كود التوجيه الذكي التلقائي الجديد
            const urlParams = new URLSearchParams(window.location.search);
            const categoryParam = urlParams.get('category');
            
            if (categoryParam) {
                const matchedCategory = Object.keys(dhikrData).find(cat => {
                    if (categoryParam === 'morning' && cat.includes('الصباح')) return true;
                    if (categoryParam === 'evening' && cat.includes('المساء')) return true;
                    if (categoryParam === 'sleep' && cat.includes('النوم')) return true;
                    return cat === categoryParam;
                });

                if (matchedCategory) {
                    setTimeout(() => {
                        openCategory(matchedCategory);
                    }, 150);
                }
            }
        }

        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            isDark ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        function openCategory(category) {
            homePage.style.display = 'none'; dhikrPage.style.display = 'block';
            pageTitle.innerText = category; renderDhikrList(category);
            updateProgress(category); window.scrollTo(0,0);
        }

        function renderDhikrList(category) {
            dhikrList.innerHTML = '';
            dhikrData[category].forEach((item, idx) => {
                const saved = getSavedCount(category, idx);
                const isCompleted = saved >= item.count;
                const div = document.createElement('div');
                div.className = `dhikr-card ${isCompleted ? 'completed' : ''}`;
                div.id = `card-${idx}`;
                div.innerHTML = `
                    <div class="tap-area" onclick="incrementDhikr('${category}', ${idx}, ${item.count}, this, event)"></div>
                    <div class="dhikr-text">${item.text}</div>
                    <div class="dhikr-controls">
                        <span class="count-badge" id="badge-${idx}">${saved} / ${item.count}</span>
                    </div>`;
                dhikrList.appendChild(div);
            });
        }

        function incrementDhikr(category, idx, max, element, event) {
            let current = getSavedCount(category, idx);
            if (current < max) {
                current++;
                saveCount(category, idx, current);
                document.getElementById(`badge-${idx}`).innerText = `${current} / ${max}`;
                
                const rect = element.getBoundingClientRect();
                const circle = document.createElement('div');
                circle.className = 'click-effect';
                circle.style.left = `${event.clientX - rect.left}px`;
                circle.style.top = `${event.clientY - rect.top}px`;
                element.parentElement.appendChild(circle);
                setTimeout(() => circle.remove(), 600);

                if (current >= max) {
                    document.getElementById(`card-${idx}`).classList.add('completed');
                    if("vibrate" in navigator) navigator.vibrate([50, 50, 50]);
                } else {
                    if("vibrate" in navigator) navigator.vibrate(30);
                }
                updateProgress(category);
            }
        }

        function getSavedCount(cat, idx) { return parseInt(localStorage.getItem(`dhikr-${cat}-${idx}`)) || 0; }
        function saveCount(cat, idx, val) { localStorage.setItem(`dhikr-${cat}-${idx}`, val); }

        function updateProgress(category) {
            const total = dhikrData[category].length;
            let done = 0;
            dhikrData[category].forEach((_, idx) => { if(getSavedCount(category, idx) >= dhikrData[category][idx].count) done++; });
            const percent = Math.round((done / total) * 100);
            progressFill.style.width = `${percent}%`; progressText.innerText = `${percent}%`;
        }

        function showHome() { homePage.style.display = 'block'; dhikrPage.style.display = 'none'; }

        function toggleSettings() {
            const panel = document.getElementById('reminders-setup');
            const isHidden = window.getComputedStyle(panel).display === 'none';
            panel.style.display = isHidden ? 'block' : 'none';
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'block';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        }

        init();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsF_k_WR9ScrBC1Nq3hWboiWVm4KEigNM",
  authDomain: "islamic-dhikr.firebaseapp.com",
  projectId: "islamic-dhikr",
  storageBucket: "islamic-dhikr.firebasestorage.app",
  messagingSenderId: "335914729881",
  appId: "1:335914729881:web:ab4f5e4c8added6fc65308",
  measurementId: "G-M3GKFFF5YR"
};

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        function checkInitialToggleState() {
    const isEnabled = localStorage.getItem('firebase_notifications_enabled') === 'true';
    const toggle = document.getElementById('firebase-toggle');
    
    if (toggle) {
        // التحقق من إذن المتصفح الفعلي والتفعيل معاً
        if (Notification.permission === 'granted' && isEnabled) {
            toggle.checked = true;
        } else {
            // إذا كان الإذن ملغى في المتصفح، يتم إطفاء الزر تلقائياً
            toggle.checked = false;
            localStorage.setItem('firebase_notifications_enabled', 'false');
        }
    }
}

        window.handleNotificationToggle = function(toggleElement) {
            if (toggleElement.checked) {
                Notification.requestPermission().then((permission) => {
                    if (permission === 'granted') {
navigator.serviceWorker.register('./firebase-messaging-sw.js')                        .then((registration) => {
                            console.log("Service Worker Registered:", registration);
                            getToken(messaging, { 
                                vapidKey: 'BGVg3N1OvvzczIpOj4NuyGPtCqm-gVdNYd1U-ZIM1-DNmu6BWYHcXulbwsxQyq7kB6rVJaPbKxCSRLq1n8RUaS0', 
                                serviceWorkerRegistration: registration 
                            })
                            .then((currentToken) => {
                                if (currentToken) {
                                    console.log("Firebase Token:", currentToken);
                                    localStorage.setItem('firebase_notifications_enabled', 'true');
                                    alert("تم تفعيل إشعارات Firebase بنجاح 🎉");
                                } else {
                                    console.error("No registration token available");
                                    toggleElement.checked = false;
                                    alert("تعذر الحصول على التوكن.");
                                }
                            })
                            .catch((err) => {
                                console.error("Token Error:", err);
                                toggleElement.checked = false;
                                alert("حدث خطأ أثناء إنشاء Firebase Token.");
                            });
                        })
                        .catch((err) => {
                            console.error("Service Worker Error:", err);
                            toggleElement.checked = false;
                            alert("فشل تسجيل Service Worker.");
                        });
                    } else {
                        toggleElement.checked = false;
                        alert("لم يتم منح إذن الإشعارات.");
                    }
                });
            } else {
                localStorage.setItem('firebase_notifications_enabled', 'false');
                alert("تم إيقاف استقبال الإشعارات.");
            }
        };

        // تشغيل فحص حالة السويتش عند التحميل
        checkInitialToggleState();
    </script>
</body>
</html>
