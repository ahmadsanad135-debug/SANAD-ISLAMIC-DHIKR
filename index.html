<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>أذكار المسلم</title>

<meta name="theme-color" content="#0f3d0f">
<meta name="description" content="تطبيق أذكار المسلم - حصن المسلم الشامل">

<link rel="manifest" href="./manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#0f3d0f;
    --primary-dark:#0a290a;
    --accent:#d4af37;
    --bg:#f5f5f5;
    --card:#ffffff;
    --text:#333;
    --text-sec:#666;
    --shadow:0 4px 20px rgba(0,0,0,.08);
}

[data-theme="dark"]{
    --primary:#1a4d1a;
    --primary-dark:#102f10;
    --accent:#f0c445;
    --bg:#121212;
    --card:#1e1e1e;
    --text:#e0e0e0;
    --text-sec:#aaa;
    --shadow:0 4px 20px rgba(0,0,0,.4);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Tajawal',sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:.3s;
    padding-bottom:80px;
}

/* HEADER */
header{
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff;
    padding:20px;
    border-radius:0 0 30px 30px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:100;
    box-shadow:var(--shadow);
}

header h1{
    font-size:1.5rem;
}

.header-buttons{
    display:flex;
    gap:10px;
}

.theme-btn{
    width:42px;
    height:42px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    color:white;
    transition:.2s;
}

.theme-btn:active{
    transform:scale(.9);
}

/* CONTAINER */
.container{
    max-width:850px;
    margin:auto;
    padding:20px;
}

/* SETTINGS PANEL */
#reminders-setup{
    display:none;
    background:var(--card);
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:var(--shadow);
    border:1px solid rgba(212,175,55,.4);
}

.toggle-container{
    margin-top:15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:rgba(0,0,0,.03);
    padding:14px;
    border-radius:14px;
}

[data-theme="dark"] .toggle-container{
    background:rgba(255,255,255,.05);
}

/* SWITCH */
.switch{
    position:relative;
    width:52px;
    height:28px;
    display:inline-block;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    inset:0;
    background:#bbb;
    border-radius:40px;
    cursor:pointer;
    transition:.3s;
}

.slider::before{
    content:"";
    position:absolute;
    width:20px;
    height:20px;
    left:4px;
    bottom:4px;
    border-radius:50%;
    background:white;
    transition:.3s;
}

input:checked + .slider{
    background:var(--primary);
}

[data-theme="dark"] input:checked + .slider{
    background:var(--accent);
}

input:checked + .slider::before{
    transform:translateX(24px);
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
    gap:15px;
}

/* CARD */
.card{
    position:relative;
    overflow:hidden;
    background:var(--card);
    border-radius:24px;
    padding:22px;
    text-align:center;
    box-shadow:var(--shadow);
    cursor:pointer;
    transition:.25s;
    border:2px solid transparent;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
}

.card::before{
    content:"";
    position:absolute;
    width:90px;
    height:90px;
    top:-30px;
    right:-30px;
    background:rgba(212,175,55,.06);
    border-radius:50%;
}

.card:hover{
    border-color:var(--accent);
}

.card:active{
    transform:scale(.97);
}

/* ICON */
.card-icon{
    width:52px;
    height:52px;
    stroke:var(--primary);
    fill:none;
    margin-bottom:5px;
    z-index:2;
}

[data-theme="dark"] .card-icon{
    stroke:var(--accent);
}

.card h3{
    font-size:1rem;
    z-index:2;
}

.card span{
    font-size:.82rem;
    color:var(--text-sec);
    z-index:2;
}

/* PAGE */
#dhikr-page{
    display:none;
    position:fixed;
    inset:0;
    background:var(--bg);
    z-index:200;
    overflow-y:auto;
    padding:20px;
}

.page-header{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
}

.back-btn{
    width:45px;
    height:45px;
    border:none;
    border-radius:12px;
    background:var(--card);
    box-shadow:var(--shadow);
    color:var(--primary);
    font-size:1.2rem;
    cursor:pointer;
}

/* PROGRESS */
.progress-bar{
    width:100%;
    height:7px;
    background:rgba(0,0,0,.1);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
}

.progress-fill{
    width:0%;
    height:100%;
    background:var(--accent);
    transition:.3s;
}

/* DHIKR CARD */
.dhikr-card{
    position:relative;
    overflow:hidden;
    background:var(--card);
    padding:25px;
    border-radius:24px;
    margin-bottom:20px;
    box-shadow:var(--shadow);
    border-right:4px solid var(--primary);
    transition:.3s;
}

.dhikr-card.completed{
    opacity:.6;
    border-color:#4CAF50;
    background:rgba(76,175,80,.05);
}

.dhikr-text{
    font-family:'Amiri',serif;
    font-size:1.45rem;
    line-height:1.9;
    margin-bottom:20px;
}

.dhikr-controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.count-badge{
    background:var(--primary);
    color:white;
    padding:6px 15px;
    border-radius:30px;
    font-weight:bold;
}

.tap-area{
    position:absolute;
    inset:0;
    cursor:pointer;
}

/* RIPPLE */
.click-effect{
    position:absolute;
    background:rgba(212,175,55,.3);
    border-radius:50%;
    transform:scale(0);
    animation:ripple .6s linear;
    pointer-events:none;
}

@keyframes ripple{
    to{
        transform:scale(4);
        opacity:0;
    }
}

/* INSTALL */
#install-btn{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:var(--accent);
    color:#000;
    border:none;
    border-radius:30px;
    padding:13px 24px;
    font-weight:bold;
    box-shadow:0 4px 15px rgba(212,175,55,.4);
    z-index:500;
    display:none;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <h1>أذكار المسلم</h1>
    <div class="header-buttons">
        <button class="theme-btn" onclick="toggleSettings()">🔔</button>
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
</header>

<div class="container" id="home-page">
    <div id="reminders-setup">
        <h3 style="margin-bottom:6px;color:var(--primary)">⏰ إشعارات الأذكار</h3>
        <p style="font-size:.85rem;color:var(--text-sec)">تحكم في استقبال الإشعارات الفورية.</p>
        <div class="toggle-container">
            <span style="font-weight:bold">تفعيل الإشعارات</span>
            <label class="switch">
                <input type="checkbox" id="firebase-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="grid" id="categories-grid"></div>
    <p id="loading-msg" style="text-align:center;margin-top:20px">جاري تحميل الأذكار...</p>
</div>

<div id="dhikr-page">
    <div class="page-header">
        <button class="back-btn" onclick="showHome()">➜</button>
        <h2 id="page-title"></h2>
        <span id="progress-text" style="margin-right:auto;font-weight:bold;color:var(--primary)">0%</span>
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div id="dhikr-list"></div>
</div>

<button id="install-btn" onclick="installApp()">تثبيت التطبيق ⬇</button>

<script src="./dhikr-data.js"></script>

<script>
const grid = document.getElementById('categories-grid');
const dhikrPage = document.getElementById('dhikr-page');
const homePage = document.getElementById('home-page');
const dhikrList = document.getElementById('dhikr-list');
const pageTitle = document.getElementById('page-title');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const installBtn = document.getElementById('install-btn');
let deferredPrompt;

/* RESET */
function checkDailyReset(){
    const now = new Date();
    const todayKey = new Date(now.getTime() - (4 * 60 * 60 * 1000)).toLocaleDateString();
    const lastResetDate = localStorage.getItem('last_reset_date');
    if(lastResetDate !== todayKey){
        Object.keys(localStorage).forEach(key=>{
            if(key.startsWith('dhikr-')){
                localStorage.removeItem(key);
            }
        });
        localStorage.setItem('last_reset_date',todayKey);
    }
}
checkDailyReset();

/* ICONS */
function getCategoryIcon(name){
    const icons = {
        morning: `<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>`,
        evening: `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>`,
        prayer: `<path d="M3 10l9-7 9 7"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/>`,
        mosque: `<path d="M3 21h18"/><path d="M5 21V10l7-5 7 5v11"/><path d="M9 21v-6h6v6"/><path d="M12 5V2"/>`,
        wudu: `<path d="M12 2C9 6 7 8 7 12a5 5 0 0010 0c0-4-2-6-5-10z"/>`,
        sleep: `<path d="M20 12.5A7.5 7.5 0 1111.5 4 6 6 0 0020 12.5z"/>`,
        food: `<path d="M6 2v10"/><path d="M10 2v10"/><path d="M6 6h4"/><path d="M16 2v18"/>`,
        home: `<path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/>`,
        travel: `<path d="M2 16l20-5"/><path d="M6 12l4 4"/>`,
        quran: `<path d="M4 19a2 2 0 012-2h14"/><path d="M6 17V5a2 2 0 012-2h12v16"/>`,
        tasbeeh: `<circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>`,
        adhkar: `<path d="M12 3l2.5 5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-1z"/>`
    };

    if(name.includes('الصباح')) return icons.morning;
    if(name.includes('المساء')) return icons.evening;
    if(name.includes('الصلاة')) return icons.prayer;
    if(name.includes('المسجد')) return icons.mosque;
    if(name.includes('وضوء')) return icons.wudu;
    if(name.includes('النوم')) return icons.sleep;
    if(name.includes('الطعام')) return icons.food;
    if(name.includes('المنزل')) return icons.home;
    if(name.includes('السفر')) return icons.travel;
    if(name.includes('القرآن')) return icons.quran;
    if(name.includes('تسابيح')) return icons.tasbeeh;
    return icons.adhkar;
}

/* INIT */
function init(){
    if(typeof dhikrData === 'undefined'){
        document.getElementById('loading-msg').innerHTML = '❌ خطأ في تحميل dhikr-data.js';
        return;
    }
    document.getElementById('loading-msg').style.display='none';
    grid.innerHTML='';

    Object.keys(dhikrData).forEach(category=>{
        const card = document.createElement('div');
        card.className='card';
        card.innerHTML = `
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
             ${getCategoryIcon(category)}
        </svg>
        <h3>${category}</h3>
        <span>${dhikrData[category].length} ذكر</span>
        `;
        card.onclick = ()=> openCategory(category);
        grid.appendChild(card);
    });

    if(localStorage.getItem('theme') === 'dark'){
        document.body.setAttribute('data-theme','dark');
    }
}

function toggleTheme(){
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    if(isDark){
        document.body.removeAttribute('data-theme');
    }else{
        document.body.setAttribute('data-theme','dark');
    }
    localStorage.setItem('theme', isDark ? 'light':'dark');
}

/* CATEGORY */
function openCategory(category){
    homePage.style.display='none';
    dhikrPage.style.display='block';
    pageTitle.innerText = category;
    renderDhikrList(category);
    updateProgress(category);
    window.scrollTo(0,0);
}

function renderDhikrList(category){
    dhikrList.innerHTML='';
    dhikrData[category].forEach((item,idx)=>{
        const saved = getSavedCount(category,idx);
        const completed = saved >= item.count;
        const div = document.createElement('div');
        div.className = `dhikr-card ${completed ? 'completed':''}`;
        div.id = `card-${idx}`;
        div.innerHTML = `
        <div class="tap-area" onclick="incrementDhikr('${category}',${idx},${item.count},this,event)"></div>
        <div class="dhikr-text">${item.text}</div>
        <div class="dhikr-controls">
            <span class="count-badge" id="badge-${idx}">${saved} / ${item.count}</span>
        </div>
        `;
        dhikrList.appendChild(div);
    });
}

/* COUNTER */
function incrementDhikr(category,idx,max,element,event){
    let current = getSavedCount(category,idx);
    if(current < max){
        current++;
        saveCount(category,idx,current);
        document.getElementById(`badge-${idx}`).innerText = `${current} / ${max}`;

        const rect = element.getBoundingClientRect();
        const circle = document.createElement('div');
        circle.className='click-effect';
        circle.style.left = `${event.clientX - rect.left}px`;
        circle.style.top = `${event.clientY - rect.top}px`;
        element.parentElement.appendChild(circle);
        setTimeout(()=> circle.remove(),600);

        if(current >= max){
            document.getElementById(`card-${idx}`).classList.add('completed');
            if("vibrate" in navigator) navigator.vibrate([50,50,50]);
        }else{
            if("vibrate" in navigator) navigator.vibrate(30);
        }
        updateProgress(category);
    }
}

function getSavedCount(cat,idx){ return parseInt(localStorage.getItem(`dhikr-${cat}-${idx}`)) || 0; }
function saveCount(cat, idx, val) { localStorage.setItem(`dhikr-${cat}-${idx}`, val); }

        function updateProgress(category) {
            const total = dhikrData[category].length;
            let done = 0;
            dhikrData[category].forEach((_, idx) => { if(getSavedCount(category, idx) >= dhikrData[category][idx].count) done++; });
            const percent = Math.round((done / total) * 100);
            progressFill.style.width = `${percent}%`; progressText.innerText = `${percent}%`;
        }

        function showHome() { homePage.style.display = 'block'; dhikrPage.style.display = 'none'; }

        function toggleSettings() {
            const panel = document.getElementById('reminders-setup');
            const isHidden = window.getComputedStyle(panel).display === 'none';
            panel.style.display = isHidden ? 'block' : 'none';
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'block';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        }

        init();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCs704ZMKYWKTVGkOMdUjYWHlmUsVNDY6U",
            authDomain: "islamic-dhikr-230fa.firebaseapp.com",
            projectId: "islamic-dhikr-230fa",
            storageBucket: "islamic-dhikr-230fa.firebasestorage.app",
            messagingSenderId: "525068923867",
            appId: "1:525068923867:web:8157fbafc2f5f075adedfe",
            measurementId: "G-0YHF9FJYM7"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        // فحص حالة الزر المخزنة وتحديث السويتش عند تشغيل التطبيق أول مرة
        function checkInitialToggleState() {
            const isEnabled = localStorage.getItem('firebase_notifications_enabled') === 'true';
            const toggle = document.getElementById('firebase-toggle');
            if (toggle) {
                toggle.checked = isEnabled;
            }
        }

        // إدارة عمل السويتش تشغيل وإطفاء
        window.handleNotificationToggle = function(toggleElement) {
            if (toggleElement.checked) {
                Notification.requestPermission().then((permission) => {
                    if (permission === 'granted') {
                        
                        navigator.serviceWorker.register('/SANAD-ISLAMIC-DHIKR/firebase-messaging-sw.js')
                        .then((registration) => {

                            // جلب التوكن المباشر بالمفتاح الجديد
                            getToken(messaging, { 
                                vapidKey: 'BDWhgllFA_C73QSG2VPzH9idpNeHgKh-XoABDwbp94TI-ZtwLGvdLNjft3O-0GseQwhenlURHx3M5z3YKia6Ikw',
                                serviceWorkerRegistration: registration 
                            })
                            .then((currentToken) => {
                                if (currentToken) {
                                    console.log("Token: ", currentToken);
                                    localStorage.setItem('firebase_notifications_enabled', 'true');
                                    alert("تم ربط وتفعيل إشعارات Firebase بنجاح! 🎉");
                                } else {
                                    toggleElement.checked = false;
                                    alert("لم يتم العثور على توكن، حاول مرة أخرى.");
                                }
                            }).catch((err) => {
                                console.error('خطأ التوكن: ', err);
                                toggleElement.checked = false;
                                alert("حدث خطأ أثناء جلب التوكن، تأكد من مطابقة مفتاح الـ VAPID.");
                            });
                        }).catch((swErr) => {
                            console.error('SW Error: ', swErr);
                            toggleElement.checked = false;
                            alert("ملف الـ Service Worker مفقود أو غير مسجل بشكل صحيح.");
                        });

                    } else {
                        toggleElement.checked = false;
                        alert("يرجى تفعيل صلاحية الإشعارات للمتصفح أولاً.");
                    }
                });
            } else {
                // عند إطفاء الزر نقوم بتحديث الحالة فقط محلياً لمنع استقبال الإشعارات بالتطبيق
                localStorage.setItem('firebase_notifications_enabled', 'false');
                alert("تم إيقاف استقبال الإشعارات الفورية.");
            }
        }

        // استقبال الإشعارات والتطبيق مفتوح
        onMessage(messaging, (payload) => {
            if (localStorage.getItem('firebase_notifications_enabled') === 'true') {
                alert(`🔔 إشعار فوري جديد:\n${payload.notification.title}\n${payload.notification.body}`);
            }
        });

        // تشغيل الفحص بعد استقرار الواجهة
        setTimeout(checkInitialToggleState, 500);
    </script>
</body>
</html>
